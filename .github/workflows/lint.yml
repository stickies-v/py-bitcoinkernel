name: Lint & Type Check

on: [push]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Ruff
        uses: astral-sh/ruff-action@v2
        with:
          args: check

      - name: Run Ruff Format
        uses: astral-sh/ruff-action@v2
        with:
          args: format --check

  ty:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Read ty version from pyproject.toml
        id: ty-version
        run: echo "version=$(awk -F'"' '/^[[:space:]]*"ty==/ {print $2}' pyproject.toml)" >> "$GITHUB_OUTPUT"

      - run: uvx --with pytest ${{ steps.ty-version.outputs.version }} check
